<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kinobuchungssystem</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#111827;
color:white;
padding:20px;
}

.container{
max-width:1200px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:20px;
}

.search-box{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-bottom:20px;
font-size:16px;
}

.add-form{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
gap:10px;
margin-bottom:30px;
}

.add-form input,
.add-form select,
.add-form button{
padding:12px;
border:none;
border-radius:10px;
}

.add-form button{
background:#4f46e5;
color:white;
cursor:pointer;
}

.movies{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.movie-card{
background:#1f2937;
padding:20px;
border-radius:15px;
cursor:pointer;
transition:.3s;
border:2px solid transparent;
}

.movie-card:hover{
border-color:#6366f1;
}

.movie-icon{
font-size:60px;
text-align:center;
margin-bottom:10px;
}

.badge{
display:inline-block;
padding:5px 10px;
border-radius:20px;
background:#4f46e5;
font-size:12px;
margin-top:10px;
}

.booking{
display:none;
margin-top:30px;
background:#1f2937;
padding:20px;
border-radius:15px;
}

.booking select{
width:100%;
padding:12px;
border:none;
border-radius:10px;
margin-top:10px;
margin-bottom:10px;
}

.screen{
width:80%;
height:60px;
margin:25px auto;
background:linear-gradient(to bottom,#fff,#ddd);
color:#111;
font-weight:bold;
display:flex;
align-items:center;
justify-content:center;
border-radius:100px 100px 20px 20px;
box-shadow:0 0 30px rgba(255,255,255,.4);
}

.legend{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
margin-bottom:20px;
}

.box{
width:15px;
height:15px;
display:inline-block;
border-radius:4px;
margin-right:5px;
}

.free{ background:#374151; }
.selected{ background:#3b82f6; }

.seats{
display:grid;
grid-template-columns:repeat(5,1fr);
gap:10px;
max-width:450px;
margin:auto;
}

.seat{
height:45px;
background:#374151;
display:flex;
align-items:center;
justify-content:center;
border-radius:8px;
cursor:pointer;
font-size:12px;
transition:.2s;
}

.seat:hover{
transform:scale(1.05);
}

.seat.selected{
background:#3b82f6;
}

.book-btn{
width:100%;
margin-top:20px;
padding:15px;
border:none;
border-radius:10px;
background:#10b981;
color:white;
font-size:18px;
cursor:pointer;
}

@media(max-width:600px){
.seats{
grid-template-columns:repeat(3,1fr);
}
}
</style>
</head>

<body>

<div class="container">

<h1>🎬 Kinobuchungssystem</h1>

<input class="search-box" id="search"
placeholder="Film suchen..." onkeyup="searchMovie()">

<div class="add-form">
<input id="title" placeholder="Filmtitel">
<input id="genre" placeholder="Genre">
<input id="duration" placeholder="Dauer in Minuten">

<select id="fsk">
<option>FSK 0</option>
<option>FSK 6</option>
<option>FSK 12</option>
<option>FSK 16</option>
<option>FSK 18</option>
</select>

<button onclick="addMovie()">Film hinzufügen</button>
</div>

<div class="movies" id="movies"></div>

<div class="booking" id="booking">

<h2 id="selectedMovie"></h2>

<select id="hall">
<option>Saal 1</option>
<option>Saal 2</option>
<option>Saal 3</option>
<option>Saal 4</option>
</select>

<select id="date">
<option>Heute</option>
<option>Morgen</option>
<option>Übermorgen</option>
</select>

<select id="time">
<option>14:00</option>
<option>16:30</option>
<option>19:00</option>
<option>21:30</option>
</select>

<h3 style="margin-top:20px;">Sitzplatz wählen</h3>

<div class="screen">🎥 LEINWAND</div>

<div class="legend">
<div><span class="box free"></span>Frei</div>
<div><span class="box selected"></span>Ausgewählt</div>
</div>

<div id="seats" class="seats"></div>

<button class="book-btn" onclick="bookTicket()">
🎟 Ticket buchen
</button>

</div>

</div>

<script>

let movies = JSON.parse(localStorage.getItem("movies")) || [
{title:"Avatar", genre:"Fantasy", duration:"162", fsk:"FSK 12"},
{title:"Drachenwelt", genre:"Fantasy", duration:"142", fsk:"FSK 6"}
];

let currentMovie = "";

function saveMovies(){
localStorage.setItem("movies", JSON.stringify(movies));
}

function renderMovies(){
const container = document.getElementById("movies");
container.innerHTML = "";

movies.forEach(movie=>{
container.innerHTML += `
<div class="movie-card" onclick="openBooking('${movie.title}')">
<div class="movie-icon">🎬</div>
<h3>${movie.title}</h3>
<p>${movie.genre}</p>
<p>${movie.duration} Minuten</p>
<div class="badge">${movie.fsk}</div>
</div>`;
});
}

function addMovie(){
const title = document.getElementById("title").value.trim();
const genre = document.getElementById("genre").value.trim();
let duration = document.getElementById("duration").value.trim();
const fsk = document.getElementById("fsk").value;

duration = duration
.replace(/minuten/gi,"")
.replace(/min/gi,"")
.trim();

if(!title) return;

movies.push({title, genre, duration, fsk});
saveMovies();
renderMovies();
}

function searchMovie(){
const value = document.getElementById("search").value.toLowerCase();
document.querySelectorAll(".movie-card").forEach(card=>{
card.style.display = card.innerText.toLowerCase().includes(value) ? "block" : "none";
});
}

function openBooking(movie){
currentMovie = movie;
document.getElementById("booking").style.display="block";
document.getElementById("selectedMovie").innerText="Film: " + movie;
createSeats();
}

function createSeats(){

const seats = document.getElementById("seats");
seats.innerHTML = "";

for(let i=1;i<=15;i++){

const seat = document.createElement("div");
seat.className = "seat";
seat.textContent = i;

seat.onclick = () => {
seat.classList.toggle("selected");
};

seats.appendChild(seat);
}
}

function bookTicket(){

const selected = [...document.querySelectorAll(".seat.selected")]
.map(s => s.textContent);

if(selected.length === 0){
alert("Bitte Sitz wählen");
return;
}

alert(`🎟 Buchung erfolgreich!

Film: ${currentMovie}
Sitze: ${selected.join(", ")}`);
}

renderMovies();

</script>

</body>
</html>
